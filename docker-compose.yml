services:
    spacic-be:
        build: ./backend
        container_name: spacic-be
        env_file: ./backend/.env
        networks:
            - web_gateway
        restart: always
        # Wait for the recsys service to pass its HEALTHCHECK before starting the backend.
        # This avoids early-boot ECONNREFUSED errors on the first scheduled rec call.
        depends_on:
            spacic-recsys:
                condition: service_healthy

    spacic-fe:
        build:
            context: ./frontend
            args:
                - VITE_API_URL=${VITE_API_URL}
                - VITE_SOCKET_URL=${VITE_SOCKET_URL}
                - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        container_name: spacic-fe
        networks:
            - web_gateway
        restart: always

    spacic-recsys:
        build: ./recsys
        container_name: spacic-recsys
        env_file: ./recsys/.env
        # Not exposed externally — only reachable by spacic-be inside web_gateway
        networks:
            - web_gateway
        restart: always
        # Persist MLflow run history and trained model artefacts across redeploys.
        # Without this volume, every `docker compose up` discards all training history.
        volumes:
            - recsys_mlflow:/app/mlruns

volumes:
    recsys_mlflow:

networks:
    web_gateway:
        external: true
