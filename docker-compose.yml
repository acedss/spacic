services:
    spacic-be:
        build: ./backend
        container_name: spacic-be
        env_file: ./backend/.env
        networks:
            - web_gateway
        restart: always

    spacic-fe:
        build:
            context: ./frontend
            args:
                - VITE_API_URL=${VITE_API_URL}
                - VITE_SOCKET_URL=${VITE_SOCKET_URL}
                - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        container_name: spacic-fe
        networks:
            - web_gateway
        restart: always

networks:
    web_gateway:
        external: true
