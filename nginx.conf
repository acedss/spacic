# nginx reverse-proxy config for Spacic
# Copy to /etc/nginx/sites-available/spacic and symlink to sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# CRITICAL for games/real-time: the /socket.io/ location MUST have the
# Upgrade + Connection headers, or Socket.IO falls back to HTTP long-polling.
# Long-poll has 1-3s latency per event — game timers and sync checkpoints break.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Backend API + WebSocket ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name spapi.aceds.space;

    # TODO(human): point to your cert/key (e.g. from certbot)
    ssl_certificate     /etc/letsencrypt/live/spapi.aceds.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spapi.aceds.space/privkey.pem;

    # Socket.IO — WebSocket upgrade REQUIRED
    location /socket.io/ {
        proxy_pass         http://spacic-be:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        # Keep WebSocket connections alive for long sessions
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # REST API
    location /api/ {
        proxy_pass         http://spacic-be:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # Stripe webhook — raw body must not be buffered
    location /api/wallet/webhook {
        proxy_pass         http://spacic-be:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_request_buffering off;
        client_max_body_size 1m;
    }
}

# ── Frontend SPA ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name spacic.aceds.space;

    ssl_certificate     /etc/letsencrypt/live/spacic.aceds.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spacic.aceds.space/privkey.pem;

    location / {
        proxy_pass         http://spacic-fe:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name spacic.aceds.space spapi.aceds.space;
    return 301 https://$host$request_uri;
}
